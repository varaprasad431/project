name: pythonci

on:
 push:
    branches:
       - main
 pull_request:
    branches:
       - main
jobs:
   Test:
     runs-on: ubuntu-latest
     steps:
        - name: check out code
          uses: actions/checkout@v2
        - name: set up python
          uses: actions/setup-python@v2
          with:
             python-version: "3.12"
        - name: install dependencies
          run: 
            python -m pip install --upgrade pip
            pip install -r requirments.txt
        - name: run tests
          run: pytest
          
